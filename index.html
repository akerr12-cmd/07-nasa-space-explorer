<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Public+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <div class="title-group">
        <p class="agency-line">National Aeronautics and Space Administration</p>
        <h1>Space Explorer</h1>
      </div>
    </header>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button>Get Space Images</button>
    </div>

    <section class="space-fact" aria-live="polite">
      <h2>Did You Know?</h2>
      <p id="randomSpaceFact">Loading a random space fact...</p>
    </section>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>
  </div>

  <!-- Modal window for detailed APOD view -->
  <div id="apodModal" class="modal-overlay" hidden>
    <div class="modal-window" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <p class="modal-agency-line">NASA APOD Mission Feed</p>
      <button id="modalCloseBtn" class="modal-close" aria-label="Close details">×</button>
      <img id="modalImage" class="modal-image" src="" alt="" />
      <iframe id="modalVideo" class="modal-video" src="" title="APOD video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen hidden></iframe>
      <video id="modalVideoPlayer" class="modal-video" controls hidden></video>
      <p id="modalVideoFallback" class="modal-video-fallback" hidden>
        This video cannot be embedded here.
        <a id="modalVideoLink" href="#" target="_blank" rel="noopener noreferrer">Open video in a new tab</a>.
      </p>
      <h2 id="modalTitle" class="modal-title">Photo details</h2>
      <p id="modalDate" class="modal-date"></p>
      <p id="modalExplanation" class="modal-explanation"></p>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/config.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
